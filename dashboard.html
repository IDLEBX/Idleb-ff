<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDLEB FF - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(15,25,35,0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            margin-bottom: 25px;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-info { display: flex; align-items: center; gap: 20px; }
        .btn-logout {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.3);
            padding: 8px 18px;
            border-radius: 40px;
            color: #ef4444;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
        }
        .stat-card i { font-size: 28px; color: #a855f7; margin-bottom: 10px; }
        .stat-value { font-size: 28px; font-weight: 800; }
        .stat-label { font-size: 13px; color: rgba(255,255,255,0.6); }
        .section {
            background: rgba(15,25,35,0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .setting-item label { font-size: 13px; color: rgba(255,255,255,0.7); }
        .setting-item input, .setting-item select {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 12px 15px;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .actions-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .action-btn.primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; }
        .action-btn.warning { background: rgba(245,158,11,0.2); border: 1px solid rgba(245,158,11,0.3); color: #f59e0b; }
        .action-btn.danger { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
        .emotes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .emote-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }
        .emote-card:hover { background: rgba(255,255,255,0.1); }
        .emote-icon { font-size: 32px; margin-bottom: 8px; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(15,25,35,0.95);
            border-radius: 12px;
            padding: 12px 20px;
            z-index: 100;
            transform: translateX(-150%);
            transition: transform 0.3s;
        }
        .toast.show { transform: translateX(0); }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <h2>IDLEB FF</h2>
            </div>
            <div class="user-info">
                <span><i class="fas fa-user"></i> <span id="userName">User</span></span>
                <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-skull-crossbones"></i><div class="stat-value" id="totalAttacks">0</div><div class="stat-label">هجمات</div></div>
            <div class="stat-card"><i class="fas fa-music"></i><div class="stat-value" id="totalEmotes">0</div><div class="stat-label">رقصات</div></div>
            <div class="stat-card"><i class="fas fa-users"></i><div class="stat-value" id="totalTargets">0</div><div class="stat-label">أهداف</div></div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-sliders-h"></i> الإعدادات</div>
            <div class="settings-grid">
                <div class="setting-item"><label>كود التيم</label><input type="text" id="teamCode" placeholder="أدخل كود التيم"></div>
                <div class="setting-item"><label>السيرفر</label><select id="region"><option value="me">الشرق الأوسط</option><option value="eu">أوروبا</option></select></div>
                <div class="setting-item"><label>آيدي الهدف 1</label><input type="text" id="target1" placeholder="ID الهدف"></div>
                <div class="setting-item"><label>آيدي الهدف 2</label><input type="text" id="target2" placeholder="ID الهدف (اختياري)"></div>
                <div class="setting-item"><label>آيدي الهدف 3</label><input type="text" id="target3" placeholder="ID الهدف (اختياري)"></div>
            </div>
            <div class="actions-grid">
                <button class="action-btn warning" id="btnLag"><i class="fas fa-tachometer-alt"></i> لاق</button>
                <button class="action-btn primary" id="btnSniper"><i class="fas fa-crosshairs"></i> Stream Sniper</button>
                <button class="action-btn danger" id="btnAttack"><i class="fas fa-skull"></i> هجوم</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-music"></i> مكتبة الرقصات</div>
            <div class="emotes-grid" id="emotesGrid">جاري التحميل...</div>
        </div>
    </div>

    <div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

    <script>
        // التحقق من تسجيل الدخول
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }
        
        const userName = localStorage.getItem('userName') || 'User';
        document.getElementById('userName').textContent = userName;
        
        let stats = JSON.parse(localStorage.getItem('userStats') || '{"attacks":0,"emotes":0,"targets":[]}');
        document.getElementById('totalAttacks').textContent = stats.attacks;
        document.getElementById('totalEmotes').textContent = stats.emotes;
        document.getElementById('totalTargets').textContent = (stats.targets || []).length;
        
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function getTargets() {
            let targets = [];
            for (let i = 1; i <= 3; i++) {
                let val = document.getElementById(`target${i}`)?.value.trim();
                if (val && val.length >= 7) targets.push(val);
            }
            return targets;
        }
        
        function executeAction(action) {
            const targets = getTargets();
            if (targets.length === 0) {
                showToast('⚠️ الرجاء إدخال أهداف صحيحة', 'error');
                return false;
            }
            showToast(`✅ تم إرسال ${action} إلى ${targets.length} لاعبين!`, 'success');
            
            if (action === 'هجوم') {
                stats.attacks += targets.length;
                localStorage.setItem('userStats', JSON.stringify(stats));
                document.getElementById('totalAttacks').textContent = stats.attacks;
            } else if (action === 'رقصة') {
                stats.emotes += targets.length;
                localStorage.setItem('userStats', JSON.stringify(stats));
                document.getElementById('totalEmotes').textContent = stats.emotes;
            }
            
            // إضافة للسجل
            let history = JSON.parse(localStorage.getItem('actionHistory') || '[]');
            history.unshift({ message: `${action} على ${targets.length} هدف`, type: 'success', timestamp: new Date().toLocaleString('ar-EG') });
            if (history.length > 50) history.pop();
            localStorage.setItem('actionHistory', JSON.stringify(history));
            
            return true;
        }
        
        document.getElementById('btnLag').addEventListener('click', () => executeAction('لاق'));
        document.getElementById('btnAttack').addEventListener('click', () => executeAction('هجوم'));
        document.getElementById('btnSniper').addEventListener('click', () => window.location.href = 'streamsnip.html');
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('isLoggedIn');
            window.location.href = 'index.html';
        });
        
        // الرقصات
        const emotes = [
            { name: "Grenade Toss", icon: "💣" }, { name: "Dance Off", icon: "🕺" },
            { name: "Floss Dance", icon: "💃" }, { name: "Robot Dance", icon: "🤖" },
            { name: "Victory Pose", icon: "🏆" }, { name: "Laugh", icon: "😂" },
            { name: "Heart", icon: "❤️" }, { name: "Thumbs Up", icon: "👍" }
        ];
        
        const grid = document.getElementById('emotesGrid');
        grid.innerHTML = emotes.map(e => `
            <div class="emote-card" onclick="sendEmote('${e.name}')">
                <div class="emote-icon">${e.icon}</div>
                <div>${e.name}</div>
            </div>
        `).join('');
        
        window.sendEmote = (name) => executeAction(`رقصة ${name}`);
        
        // حفظ الإعدادات
        const settings = JSON.parse(localStorage.getItem('userSettings') || '{}');
        if (document.getElementById('teamCode')) document.getElementById('teamCode').value = settings.teamCode || '';
        if (document.getElementById('region')) document.getElementById('region').value = settings.region || 'me';
        
        function saveSettings() {
            localStorage.setItem('userSettings', JSON.stringify({
                teamCode: document.getElementById('teamCode')?.value || '',
                region: document.getElementById('region')?.value || 'me',
                target1: document.getElementById('target1')?.value || '',
                target2: document.getElementById('target2')?.value || '',
                target3: document.getElementById('target3')?.value || ''
            }));
        }
        
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('change', saveSettings);
        });
        
        // تحميل الأهداف المحفوظة
        if (settings.target1) document.getElementById('target1').value = settings.target1;
        if (settings.target2) document.getElementById('target2').value = settings.target2;
        if (settings.target3) document.getElementById('target3').value = settings.target3;
    </script>
</body>
</html>
