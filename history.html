<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDLEB FF - السجل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(15,25,35,0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            margin-bottom: 25px;
        }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-back {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .stats-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 32px; font-weight: 800; color: #a855f7; }
        .stat-label { font-size: 13px; color: rgba(255,255,255,0.6); }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .filter-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            color: white;
            margin-bottom: 20px;
        }
        .history-list {
            background: rgba(15,25,35,0.5);
            border-radius: 20px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            border-right: 3px solid transparent;
        }
        .history-item.success { border-right-color: #22c55e; }
        .history-item.error { border-right-color: #ef4444; }
        .history-item.info { border-right-color: #a855f7; }
        .history-icon {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
        }
        .history-icon.success { background: rgba(34,197,94,0.2); color: #22c55e; }
        .history-icon.error { background: rgba(239,68,68,0.2); color: #ef4444; }
        .history-icon.info { background: rgba(168,85,247,0.2); color: #a855f7; }
        .history-message { font-weight: 600; margin-bottom: 5px; }
        .history-time { font-size: 11px; color: rgba(255,255,255,0.5); }
        .btn-clear {
            width: 100%;
            padding: 14px;
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            color: #ef4444;
            cursor: pointer;
            margin-top: 20px;
        }
        .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5); }
        .empty-state i { font-size: 64px; margin-bottom: 20px; opacity: 0.5; }
        @media (max-width: 600px) { .history-item { flex-direction: column; align-items: flex-start; gap: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <h2>IDLEB FF</h2>
            </div>
            <button class="btn-back" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-right"></i> رجوع</button>
        </div>

        <div class="stats-card">
            <div class="stat-item"><div class="stat-value" id="totalCount">0</div><div class="stat-label">إجمالي العمليات</div></div>
            <div class="stat-item"><div class="stat-value" id="successCount">0</div><div class="stat-label">ناجحة</div></div>
            <div class="stat-item"><div class="stat-value" id="errorCount">0</div><div class="stat-label">فاشلة</div></div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="success">ناجحة</button>
            <button class="filter-btn" data-filter="error">فاشلة</button>
            <button class="filter-btn" data-filter="info">معلومات</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchHistory" placeholder="بحث في السجل...">
        </div>

        <div class="history-list" id="historyList">
            <div class="empty-state"><i class="fas fa-history"></i><p>لا يوجد سجل حتى الآن</p></div>
        </div>

        <button class="btn-clear" id="clearAllBtn"><i class="fas fa-trash-alt"></i> مسح كل السجل</button>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('actionHistory') || '[]');
        let currentFilter = 'all';
        let searchTerm = '';

        function updateStats() {
            document.getElementById('totalCount').textContent = history.length;
            document.getElementById('successCount').textContent = history.filter(h => h.type === 'success').length;
            document.getElementById('errorCount').textContent = history.filter(h => h.type === 'error').length;
        }

        function getIconClass(type) {
            switch(type) {
                case 'success': return 'fa-check-circle';
                case 'error': return 'fa-times-circle';
                default: return 'fa-info-circle';
            }
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            let filtered = history;
            if (currentFilter !== 'all') filtered = filtered.filter(h => h.type === currentFilter);
            if (searchTerm) filtered = filtered.filter(h => h.message.toLowerCase().includes(searchTerm.toLowerCase()));
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i><p>لا يوجد سجل</p></div>';
                return;
            }
            
            container.innerHTML = filtered.map(item => `
                <div class="history-item ${item.type}">
                    <div class="history-icon ${item.type}"><i class="fas ${getIconClass(item.type)}"></i></div>
                    <div style="flex:1">
                        <div class="history-message">${item.message}</div>
                        <div class="history-time">${item.timestamp}</div>
                    </div>
                </div>
            `).join('');
        }

        function clearAllHistory() {
            if (confirm('⚠️ هل أنت متأكد من مسح كل السجل؟')) {
                history = [];
                localStorage.setItem('actionHistory', JSON.stringify(history));
                updateStats();
                renderHistory();
            }
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderHistory();
            });
        });

        document.getElementById('searchHistory').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderHistory();
        });

        document.getElementById('clearAllBtn').addEventListener('click', clearAllHistory);

        updateStats();
        renderHistory();
    </script>
</body>
</html>
