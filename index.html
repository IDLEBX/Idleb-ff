<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDLEB FF - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { width: 100%; max-width: 450px; padding: 20px; }
        .card {
            background: rgba(15,25,35,0.85);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 24px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p { color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 4px; }
        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        .input-wrapper { position: relative; }
        .input-wrapper input {
            width: 100%;
            height: 52px;
            padding: 0 48px 0 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #a855f7;
        }
        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
        }
        .toggle-password {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .btn-primary {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .register-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .register-link a { color: #a855f7; text-decoration: none; }
        .register-link p { color: rgba(255,255,255,0.5); font-size: 14px; }
        .developer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
        .developer a { color: rgba(255,255,255,0.6); text-decoration: none; }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .message.show { display: block; }
        .message.error { background: rgba(239,68,68,0.15); color: #ef4444; }
        .message.success { background: rgba(34,197,94,0.15); color: #22c55e; }
        .loading .btn-primary {
            color: transparent;
            position: relative;
        }
        .loading .btn-primary::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) { .card { padding: 32px 24px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <h1>IDLEB FF</h1>
                <p>أدخل بياناتك للمتابعة</p>
            </div>
            <div class="message" id="message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>معرف المستخدم (ID)</label>
                    <div class="input-wrapper">
                        <input type="text" id="userId" placeholder="أدخل الايدي الخاص" autocomplete="off">
                        <i class="fas fa-id-card input-icon"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>الاسم</label>
                    <div class="input-wrapper">
                        <input type="text" id="userName" placeholder="أدخل اسمك">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>
                <button type="submit" class="btn-primary">دخول</button>
            </form>
            <div class="register-link">
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
            </div>
            <div class="developer">
                <p>Developed by <a href="https://instagram.com/xlb_me" target="_blank">IDLEB X</a></p>
            </div>
        </div>
    </div>
    <script>
        const form = document.getElementById('loginForm');
        const msgDiv = document.getElementById('message');
        function showMsg(text, type) {
            msgDiv.textContent = text;
            msgDiv.className = `message ${type} show`;
            setTimeout(() => msgDiv.classList.remove('show'), 4000);
        }
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const userId = document.getElementById('userId').value.trim();
            const userName = document.getElementById('userName').value.trim();
            if (!userId || !userName) {
                showMsg('⚠️ الرجاء إدخال جميع البيانات', 'error');
                return;
            }
            if (userId.length < 7) {
                showMsg('❌ ID يجب أن يكون 7 أرقام على الأقل', 'error');
                return;
            }
            form.classList.add('loading');
            setTimeout(() => {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userId', userId);
                localStorage.setItem('userName', userName);
                localStorage.setItem('joinDate', new Date().toISOString());
                showMsg('✅ تم تسجيل الدخول بنجاح!', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            }, 1000);
        });
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
