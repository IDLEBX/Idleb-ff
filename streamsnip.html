<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDLEB FF - Stream Sniper</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(15,25,35,0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            margin-bottom: 25px;
        }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-back {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .add-player {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .add-player input {
            flex: 1;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
        }
        .add-player button {
            padding: 14px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .player-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
        }
        .player-name { font-weight: 700; margin-bottom: 8px; }
        .player-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            display: inline-block;
        }
        .player-status.online { background: rgba(34,197,94,0.2); color: #22c55e; }
        .player-status.offline { background: rgba(107,114,128,0.2); color: #9ca3af; }
        .player-details { font-size: 12px; color: rgba(255,255,255,0.6); margin: 10px 0; }
        .player-actions { display: flex; gap: 10px; margin-top: 10px; }
        .player-actions button {
            flex: 1;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-snipe { background: rgba(168,85,247,0.2); border: none; color: #a855f7; }
        .btn-remove { background: rgba(239,68,68,0.2); border: none; color: #ef4444; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(15,25,35,0.95);
            border-radius: 12px;
            padding: 12px 20px;
            z-index: 100;
            transform: translateX(-150%);
            transition: transform 0.3s;
        }
        .toast.show { transform: translateX(0); }
        @media (max-width: 600px) { .add-player { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <h2>IDLEB FF - Stream Sniper</h2>
            </div>
            <button class="btn-back" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-right"></i> رجوع</button>
        </div>

        <div class="add-player">
            <input type="text" id="playerId" placeholder="أدخل ID اللاعب (8-12 رقم)" maxlength="12">
            <button id="addBtn"><i class="fas fa-plus"></i> إضافة لاعب</button>
        </div>

        <div class="players-grid" id="playersGrid">لا يوجد لاعبين</div>
    </div>

    <div class="toast" id="toast"><span id="toastMsg"></span></div>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'index.html';
        
        let players = JSON.parse(localStorage.getItem('streamPlayers') || '[]');
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function renderPlayers() {
            const container = document.getElementById('playersGrid');
            if (players.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;">لا يوجد لاعبين</div>';
                return;
            }
            container.innerHTML = players.map(p => `
                <div class="player-card">
                    <div class="player-name">${p.name || 'لاعب ' + p.id}</div>
                    <div><span class="player-status ${p.status}">${p.status === 'online' ? '🟢 متصل' : '⚫ غير متصل'}</span></div>
                    <div class="player-details"><i class="fas fa-id-card"></i> ID: ${p.id}<br><i class="fas fa-clock"></i> يتبقى: ${Math.max(0, Math.ceil((p.expiresAt - Date.now()) / 60000))} دقيقة</div>
                    <div class="player-actions">
                        <button class="btn-snipe" onclick="snipePlayer('${p.id}')"><i class="fas fa-crosshairs"></i> Snipe</button>
                        <button class="btn-remove" onclick="removePlayer('${p.id}')"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </div>
            `).join('');
        }
        
        function addPlayer(id) {
            if (!id.match(/^\d{8,12}$/)) {
                showToast('❌ ID يجب أن يكون 8-12 رقم فقط');
                return false;
            }
            if (players.find(p => p.id === id)) {
                showToast('⚠️ هذا اللاعب موجود مسبقاً');
                return false;
            }
            players.push({
                id: id, name: null, status: 'offline',
                addedAt: Date.now(), expiresAt: Date.now() + 5 * 60 * 1000
            });
            localStorage.setItem('streamPlayers', JSON.stringify(players));
            renderPlayers();
            showToast(`✅ تم إضافة اللاعب ${id}`);
            return true;
        }
        
        function removePlayer(id) {
            players = players.filter(p => p.id !== id);
            localStorage.setItem('streamPlayers', JSON.stringify(players));
            renderPlayers();
            showToast(`🗑️ تم حذف اللاعب`);
        }
        
        function snipePlayer(id) {
            showToast(`🎯 جاري استهداف ${id}...`);
            setTimeout(() => {
                showToast(`✅ تم إرسال الطلب إلى ${id}`);
                let history = JSON.parse(localStorage.getItem('actionHistory') || '[]');
                history.unshift({ message: `تم استهداف ${id} عبر Stream Sniper`, type: 'success', timestamp: new Date().toLocaleString('ar-EG') });
                if (history.length > 50) history.pop();
                localStorage.setItem('actionHistory', JSON.stringify(history));
            }, 1500);
        }
        
        document.getElementById('addBtn').addEventListener('click', () => {
            const id = document.getElementById('playerId').value.trim();
            if (id) addPlayer(id);
            document.getElementById('playerId').value = '';
        });
        
        // تنظيف اللاعبين المنتهية صلاحيتهم
        setInterval(() => {
            let changed = false;
            players = players.filter(p => { if (p.expiresAt <= Date.now()) { changed = true; return false; } return true; });
            if (changed) { localStorage.setItem('streamPlayers', JSON.stringify(players)); renderPlayers(); }
        }, 60000);
        
        renderPlayers();
    </script>
</body>
</html>
