<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IDLEB FF - الملف الشخصي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
            min-height: 100vh;
            color: white;
        }
        .canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(15,25,35,0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            margin-bottom: 25px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-back {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .profile-card {
            background: rgba(15,25,35,0.7);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .profile-avatar {
            text-align: center;
            margin-bottom: 25px;
        }
        .avatar-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 30px -5px rgba(102,126,234,0.4);
        }
        .profile-name {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-top: 15px;
        }
        .profile-badge {
            text-align: center;
            color: #a855f7;
            font-size: 14px;
            margin-top: 5px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }
        .info-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
        }
        .info-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 18px;
            font-weight: 600;
        }
        .edit-form {
            margin-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: #a855f7;
        }
        .btn-save {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102,126,234,0.5);
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            margin: 20px 0;
        }
        .stats-row .stat {
            flex: 1;
        }
        .stats-row .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #a855f7;
        }
        .stats-row .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        @media (max-width: 600px) {
            .profile-card { padding: 20px; }
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <canvas class="canvas-bg" id="bgCanvas"></canvas>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <h2>IDLEB FF</h2>
            </div>
            <button class="btn-back" onclick="window.location.href='/dashboard.html'">
                <i class="fas fa-arrow-right"></i> الرجوع
            </button>
        </div>

        <div class="profile-card">
            <div class="profile-avatar">
                <div class="avatar-circle">
                    <i class="fas fa-user"></i>
                </div>
                <div class="profile-name" id="displayName">User</div>
                <div class="profile-badge" id="userBadge">عضو عادي</div>
            </div>

            <div class="stats-row">
                <div class="stat">
                    <div class="stat-number" id="statAttacks">0</div>
                    <div class="stat-label">هجمات</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="statEmotes">0</div>
                    <div class="stat-label">رقصات</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="statTargets">0</div>
                    <div class="stat-label">أهداف</div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-id-card"></i> معرف المستخدم</div>
                    <div class="info-value" id="userId">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-calendar"></i> تاريخ التسجيل</div>
                    <div class="info-value" id="joinDate">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-clock"></i> آخر نشاط</div>
                    <div class="info-value" id="lastActive">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label"><i class="fas fa-trophy"></i> المستوى</div>
                    <div class="info-value" id="userLevel">1</div>
                </div>
            </div>

            <div class="edit-form">
                <h3 style="margin-bottom: 20px; font-size: 18px;">
                    <i class="fas fa-edit"></i> تعديل الملف الشخصي
                </h3>
                <div class="form-group">
                    <label>الاسم المعروض</label>
                    <input type="text" id="editName" placeholder="أدخل اسمك">
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="editEmail" placeholder="example@email.com">
                </div>
                <button class="btn-save" id="saveProfileBtn">
                    <i class="fas fa-save"></i> حفظ التغييرات
                </button>
            </div>
        </div>
    </div>

    <script>
        // 3D Background
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
        resize(); window.addEventListener('resize', resize);
        let particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random(), y: Math.random(), z: Math.random(),
                size: Math.random() * 3 + 1,
                speedX: (Math.random() - 0.5) * 0.002,
                speedY: (Math.random() - 0.5) * 0.002,
                speedZ: (Math.random() - 0.5) * 0.003,
                color: `hsl(${260 + Math.random() * 60}, 70%, 60%)`
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#0f0c29'); grad.addColorStop(0.5, '#1a1a3e'); grad.addColorStop(1, '#24243e');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                p.x += p.speedX; p.y += p.speedY; p.z += p.speedZ;
                if (p.x > 1) p.x = 0; if (p.x < 0) p.x = 1;
                if (p.y > 1) p.y = 0; if (p.y < 0) p.y = 1;
                if (p.z > 1) p.z = 0; if (p.z < 0) p.z = 1;
                const scale = 1 / (1 + p.z * 2);
                const x = (p.x - 0.5) * canvas.width * scale + canvas.width / 2;
                const y = (p.y - 0.5) * canvas.height * scale + canvas.height / 2;
                const size = p.size * scale * 2;
                ctx.beginPath(); ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.shadowBlur = size * 3; ctx.shadowColor = p.color; ctx.fill();
            }
            requestAnimationFrame(animate);
        }
        animate();

        // التحقق من تسجيل الدخول
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = '/index.html';
        }

        // جلب البيانات
        const userId = localStorage.getItem('userId') || 'غير محدد';
        const userName = localStorage.getItem('userName') || 'User';
        const joinDate = localStorage.getItem('joinDate') || new Date().toISOString();
        const stats = JSON.parse(localStorage.getItem('userStats') || '{"attacks":0,"emotes":0,"targets":[]}');
        
        // عرض البيانات
        document.getElementById('displayName').textContent = userName;
        document.getElementById('userId').textContent = userId;
        document.getElementById('joinDate').textContent = new Date(joinDate).toLocaleDateString('ar-EG');
        document.getElementById('lastActive').textContent = new Date().toLocaleDateString('ar-EG');
        document.getElementById('statAttacks').textContent = stats.attacks || 0;
        document.getElementById('statEmotes').textContent = stats.emotes || 0;
        document.getElementById('statTargets').textContent = (stats.targets || []).length;
        
        // حساب المستوى (كل 10 هجمات = مستوى)
        const level = Math.floor((stats.attacks || 0) / 10) + 1;
        document.getElementById('userLevel').textContent = level;
        
        // البادج حسب المستوى
        const badges = {
            1: 'عضو جديد',
            5: 'عضو نشط',
            10: 'محارب',
            20: 'بطل',
            50: 'أسطورة'
        };
        let badgeText = 'عضو عادي';
        for (let [lvl, name] of Object.entries(badges)) {
            if (level >= parseInt(lvl)) badgeText = name;
        }
        document.getElementById('userBadge').textContent = badgeText;
        
        // تحميل البيانات المحفوظة للتحرير
        const profileData = JSON.parse(localStorage.getItem('profileData') || '{}');
        document.getElementById('editName').value = profileData.displayName || userName;
        document.getElementById('editEmail').value = profileData.email || '';
        
        // حفظ التغييرات
        document.getElementById('saveProfileBtn').addEventListener('click', () => {
            const newName = document.getElementById('editName').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            
            if (newName) {
                localStorage.setItem('userName', newName);
                document.getElementById('displayName').textContent = newName;
            }
            
            localStorage.setItem('profileData', JSON.stringify({
                displayName: newName,
                email: newEmail
            }));
            
            // إضافة للسجل
            let history = JSON.parse(localStorage.getItem('actionHistory') || '[]');
            history.unshift({
                message: `تم تحديث الملف الشخصي`,
                type: 'success',
                timestamp: new Date().toLocaleString('ar-EG')
            });
            if (history.length > 50) history.pop();
            localStorage.setItem('actionHistory', JSON.stringify(history));
            
            // إشعار
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed; bottom: 20px; right: 20px;
                background: #22c55e; color: white; padding: 12px 20px;
                border-radius: 12px; z-index: 1000;
                animation: fadeInOut 3s ease;
            `;
            toast.textContent = '✅ تم حفظ التغييرات بنجاح';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        });
        
        // إضافة style للـ animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateX(100px); }
                10% { opacity: 1; transform: translateX(0); }
                90% { opacity: 1; transform: translateX(0); }
                100% { opacity: 0; transform: translateX(100px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
