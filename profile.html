<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDLEB FF - الملف الشخصي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(15,25,35,0.7);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            margin-bottom: 25px;
        }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-back {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .profile-card {
            background: rgba(15,25,35,0.7);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
        }
        .profile-avatar { text-align: center; margin-bottom: 25px; }
        .avatar-circle {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .profile-name { text-align: center; font-size: 24px; font-weight: 700; margin-top: 15px; }
        .profile-badge { text-align: center; color: #a855f7; font-size: 14px; margin-top: 5px; }
        .stats-row {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            margin: 20px 0;
        }
        .stat-number { font-size: 28px; font-weight: 800; color: #a855f7; }
        .stat-label { font-size: 12px; color: rgba(255,255,255,0.6); }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .info-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
        }
        .info-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 5px; }
        .info-value { font-size: 18px; font-weight: 600; }
        .edit-form {
            margin-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 25px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .btn-save {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }
        @media (max-width: 600px) { .profile-card { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <h2>IDLEB FF</h2>
            </div>
            <button class="btn-back" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-right"></i> رجوع</button>
        </div>

        <div class="profile-card">
            <div class="profile-avatar">
                <div class="avatar-circle"><i class="fas fa-user"></i></div>
                <div class="profile-name" id="displayName">User</div>
                <div class="profile-badge" id="userBadge">عضو عادي</div>
            </div>

            <div class="stats-row">
                <div class="stat"><div class="stat-number" id="statAttacks">0</div><div class="stat-label">هجمات</div></div>
                <div class="stat"><div class="stat-number" id="statEmotes">0</div><div class="stat-label">رقصات</div></div>
                <div class="stat"><div class="stat-number" id="statTargets">0</div><div class="stat-label">أهداف</div></div>
            </div>

            <div class="info-grid">
                <div class="info-item"><div class="info-label">معرف المستخدم</div><div class="info-value" id="userId">-</div></div>
                <div class="info-item"><div class="info-label">تاريخ التسجيل</div><div class="info-value" id="joinDate">-</div></div>
                <div class="info-item"><div class="info-label">آخر نشاط</div><div class="info-value" id="lastActive">-</div></div>
                <div class="info-item"><div class="info-label">المستوى</div><div class="info-value" id="userLevel">1</div></div>
            </div>

            <div class="edit-form">
                <h3 style="margin-bottom: 20px;"><i class="fas fa-edit"></i> تعديل الملف الشخصي</h3>
                <div class="form-group"><label>الاسم المعروض</label><input type="text" id="editName" placeholder="أدخل اسمك"></div>
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="editEmail" placeholder="example@email.com"></div>
                <button class="btn-save" id="saveProfileBtn">حفظ التغييرات</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href = 'index.html';
        
        const userId = localStorage.getItem('userId') || 'غير محدد';
        const userName = localStorage.getItem('userName') || 'User';
        const joinDate = localStorage.getItem('joinDate') || new Date().toISOString();
        const stats = JSON.parse(localStorage.getItem('userStats') || '{"attacks":0,"emotes":0,"targets":[]}');
        
        document.getElementById('displayName').textContent = userName;
        document.getElementById('userId').textContent = userId;
        document.getElementById('joinDate').textContent = new Date(joinDate).toLocaleDateString('ar-EG');
        document.getElementById('lastActive').textContent = new Date().toLocaleDateString('ar-EG');
        document.getElementById('statAttacks').textContent = stats.attacks || 0;
        document.getElementById('statEmotes').textContent = stats.emotes || 0;
        document.getElementById('statTargets').textContent = (stats.targets || []).length;
        
        const level = Math.floor((stats.attacks || 0) / 10) + 1;
        document.getElementById('userLevel').textContent = level;
        
        const badges = { 1: 'عضو جديد', 5: 'عضو نشط', 10: 'محارب', 20: 'بطل', 50: 'أسطورة' };
        let badgeText = 'عضو عادي';
        for (let [lvl, name] of Object.entries(badges)) if (level >= parseInt(lvl)) badgeText = name;
        document.getElementById('userBadge').textContent = badgeText;
        
        const profileData = JSON.parse(localStorage.getItem('profileData') || '{}');
        document.getElementById('editName').value = profileData.displayName || userName;
        document.getElementById('editEmail').value = profileData.email || '';
        
        document.getElementById('saveProfileBtn').addEventListener('click', () => {
            const newName = document.getElementById('editName').value.trim();
            const newEmail = document.getElementById('editEmail').value.trim();
            if (newName) localStorage.setItem('userName', newName);
            localStorage.setItem('profileData', JSON.stringify({ displayName: newName, email: newEmail }));
            let history = JSON.parse(localStorage.getItem('actionHistory') || '[]');
            history.unshift({ message: `تم تحديث الملف الشخصي`, type: 'success', timestamp: new Date().toLocaleString('ar-EG') });
            if (history.length > 50) history.pop();
            localStorage.setItem('actionHistory', JSON.stringify(history));
            alert('✅ تم حفظ التغييرات بنجاح');
            window.location.reload();
        });
    </script>
</body>
</html>
